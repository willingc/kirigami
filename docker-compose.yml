services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: kirigami-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DISCOURSE_BASE_URL: ${DISCOURSE_BASE_URL:-https://discuss.python.org}
      DISCOURSE_USERNAME: ${DISCOURSE_USERNAME:-}
      DISCOURSE_API_KEY: ${DISCOURSE_API_KEY:-}
      KIRIGAMI_DISCOURSE_CACHE_DIR: /var/cache/kirigami/discourse
      KIRIGAMI_CORS_ORIGINS: ${KIRIGAMI_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,https://localhost,https://127.0.0.1,https://www.dpodoesnt.work}
      KIRIGAMI_CORS_ORIGIN_REGEX: ${KIRIGAMI_CORS_ORIGIN_REGEX:-https://(www\.dpodoesnt\.work|localhost|127\.0\.0\.1|0\.0\.0\.0|10\.\d+\.\d+\.\d+|172\.(1[6-9]|2\d|3[0-1])\.\d+\.\d+|192\.168\.\d+\.\d+)}
    volumes:
      - kirigami_discourse_cache:/var/cache/kirigami/discourse
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    image: kirigami-frontend:latest
    restart: unless-stopped
    environment:
      KIRIGAMI_API_BASE_URL: ${KIRIGAMI_API_BASE_URL:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    build:
      context: .
      dockerfile: docker/caddy/Dockerfile
    image: kirigami-caddy:latest
    restart: unless-stopped
    environment:
      KIRIGAMI_CADDY_ADDR: ${KIRIGAMI_CADDY_ADDR:-https://www.dpodoesnt.work}
      KIRIGAMI_API_UPSTREAM: ${KIRIGAMI_API_UPSTREAM:-backend:8000}
      KIRIGAMI_WEB_UPSTREAM: ${KIRIGAMI_WEB_UPSTREAM:-frontend:3000}
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_config:
  caddy_data:
  kirigami_discourse_cache:
