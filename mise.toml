[env]
KIRIGAMI_PYTHON_VERSION = "3.13"
NEXT_PUBLIC_API_BASE_URL = "http://127.0.0.1:8000"
KIRIGAMI_API_BASE_URL = "http://127.0.0.1:8000"

[tools]
node = "24"
uv = "latest"

[tasks.setup]
description = "Install Node, uv, Python dependencies, and Next.js dependencies."
run = """
mise install node uv
uv sync --python "$KIRIGAMI_PYTHON_VERSION"
npm install --prefix apps/web
"""

[tasks.dev]
description = "Launch the FastAPI backend and Next.js development server."
run = "./scripts/dev-web.sh"

[tasks.migrate]
description = "Apply Kirigami SQLite store migrations."
run = 'uv run --python "$KIRIGAMI_PYTHON_VERSION" python -m kirigami migrate'

[tasks.deploy]
description = "Build and launch Caddy, the FastAPI backend, and the Next.js production server with Docker Compose."
run = "./scripts/deploy-web.sh"

[tasks.clean]
description = "Remove generated Python and frontend build artifacts."
run = """
find . -name __pycache__ -type d -prune -exec rm -rf {} +
rm -rf .pytest_cache .mypy_cache .ruff_cache htmlcov .coverage coverage.xml
rm -rf build dist *.egg-info
rm -rf apps/web/.next apps/web/out apps/web/coverage
"""

[tasks.lint]
description = "Run Python Ruff checks, frontend formatting, ESLint, and TypeScript checks."
run = """
uv run --python "$KIRIGAMI_PYTHON_VERSION" ruff check .
npm run format:check --prefix apps/web
npm run lint --prefix apps/web
npm run typecheck --prefix apps/web
"""

[tasks.test]
description = "Run backend tests, frontend Vitest tests, and verify the frontend production build."
run = """
uv run --python "$KIRIGAMI_PYTHON_VERSION" pytest
npm run test --prefix apps/web
npm run build --prefix apps/web
"""
