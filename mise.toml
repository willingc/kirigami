[env]
KIRIGAMI_PYTHON_VERSION = "3.13"
NEXT_PUBLIC_API_BASE_URL = "http://127.0.0.1:8000"
KIRIGAMI_API_BASE_URL = "http://127.0.0.1:8000"

[tools]
node = "24"
uv = "latest"
pnpm = "latest"

[tasks.setup]
description = "Install Node, uv, pnpm, Python dependencies, and Next.js dependencies."
run = """
mise install node uv pnpm
uv sync --python "$KIRIGAMI_PYTHON_VERSION" --extra dev --extra web
pnpm -C apps/web install
"""

[tasks.dev]
description = "Launch the FastAPI backend and Next.js development server."
run = "./scripts/dev-web.sh"

[tasks.deploy]
description = "Build and launch Caddy, the FastAPI backend, and the Next.js production server with Docker Compose."
run = "./scripts/deploy-web.sh"

[tasks.test]
description = "Run backend tests and frontend checks."
run = """
uv run --python "$KIRIGAMI_PYTHON_VERSION" --extra dev --extra web pytest
pnpm -C apps/web run lint
pnpm -C apps/web run typecheck
pnpm -C apps/web run build
"""
